name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_target:
    types: [closed]

env:
  FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

jobs:
  # Detect which apps changed
  detect-changes:
    if: github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.changes.outputs.apps }}
    steps:
      - uses: actions/checkout@v4
      - id: changes
        run: |
          APPS="[]"
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} 2>/dev/null || echo "")

          DETECTED=()
          for APP_DIR in apps/*/; do
            APP_NAME=$(basename "$APP_DIR")
            if echo "$CHANGED_FILES" | grep -q "^apps/$APP_NAME/" || echo "$CHANGED_FILES" | grep -q "^packages/"; then
              if [[ -f "$APP_DIR/fly.toml" && -f "$APP_DIR/Dockerfile" ]]; then
                DETECTED+=("\"$APP_NAME\"")
              fi
            fi
          done

          if [[ ${#DETECTED[@]} -gt 0 ]]; then
            APPS="[$(IFS=,; echo "${DETECTED[*]}")]"
          fi

          echo "apps=$APPS" >> "$GITHUB_OUTPUT"
          echo "Detected apps to deploy: $APPS"

  # Deploy preview for each changed app
  deploy-preview:
    needs: detect-changes
    if: needs.detect-changes.outputs.apps != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        app: ${{ fromJson(needs.detect-changes.outputs.apps) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Set preview app name
        id: preview
        run: |
          PROD_APP=$(grep "^app = " "apps/${{ matrix.app }}/fly.toml" | head -1 | sed "s/app = '//;s/'//")
          BRANCH="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          MAX_LEN=$((30 - ${#PROD_APP} - 1))
          SANITIZED="${SANITIZED:0:$MAX_LEN}"
          SANITIZED="${SANITIZED%-}"

          PREVIEW_APP="${PROD_APP}-${SANITIZED}"

          echo "prod_app=$PROD_APP" >> "$GITHUB_OUTPUT"
          echo "preview_app=$PREVIEW_APP" >> "$GITHUB_OUTPUT"
          echo "🚀 Preview app: $PREVIEW_APP (from $PROD_APP)"

      - name: Create preview app if needed
        run: |
          if ! flyctl status --app "${{ steps.preview.outputs.preview_app }}" &>/dev/null; then
            echo "📦 Creating ${{ steps.preview.outputs.preview_app }}"
            flyctl apps create "${{ steps.preview.outputs.preview_app }}" --org personal
          else
            echo "✅ App already exists"
          fi

      - name: Deploy preview
        run: |
          flyctl deploy \
            --config "apps/${{ matrix.app }}/fly.toml" \
            --dockerfile "apps/${{ matrix.app }}/Dockerfile" \
            --app "${{ steps.preview.outputs.preview_app }}" \
            --remote-only \
            --no-cache

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            const app = '${{ steps.preview.outputs.preview_app }}';
            const url = `https://${app}.fly.dev/`;
            const body = `🚀 **Preview deployed for \`${{ matrix.app }}\`**\n\n🌐 ${url}\n\nApp: \`${app}\``;

            // Check for existing comment to update
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c =>
              c.body.includes(`Preview deployed for \`${{ matrix.app }}\``)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }

  # Destroy preview apps when PR is closed
  destroy-preview:
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Destroy preview apps
        run: |
          BRANCH="${{ github.head_ref }}"
          SANITIZED=$(echo "$BRANCH" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9]/-/g' | sed 's/--*/-/g' | sed 's/^-//;s/-$//')

          for FLY_TOML in apps/*/fly.toml; do
            APP_DIR=$(dirname "$FLY_TOML")
            PROD_APP=$(grep "^app = " "$FLY_TOML" | head -1 | sed "s/app = '//;s/'//")

            MAX_LEN=$((30 - ${#PROD_APP} - 1))
            SUFFIX="${SANITIZED:0:$MAX_LEN}"
            SUFFIX="${SUFFIX%-}"
            PREVIEW_APP="${PROD_APP}-${SUFFIX}"

            if flyctl status --app "$PREVIEW_APP" &>/dev/null; then
              echo "🗑️ Destroying $PREVIEW_APP"
              flyctl apps destroy "$PREVIEW_APP" --yes
            fi
          done
