app = 'crazy-fast-feature'
primary_region = 'ord'

[build]
  [build.args]
    VITE_API_URL = "https://bree-api.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
