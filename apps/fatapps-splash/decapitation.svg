<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Before: Fat Excel -->
    <g id="fat-excel">
        <!-- Excel Head (UI) -->
        <rect x="50" y="50" width="400" height="300" fill="#2d5016" stroke="#4a7c1c" stroke-width="3" rx="10"/>
        <text x="250" y="90" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="Monaco, monospace">Excel UI (HEAD)</text>
        <text x="250" y="120" text-anchor="middle" fill="#c3e88d" font-size="16" font-family="Monaco, monospace">80MB Bundle</text>
        <text x="70" y="160" fill="#aaa" font-size="14" font-family="Monaco, monospace">• 1000+ functions</text>
        <text x="70" y="190" fill="#aaa" font-size="14" font-family="Monaco, monospace">• 50 chart types</text>
        <text x="70" y="220" fill="#aaa" font-size="14" font-family="Monaco, monospace">• 200 ribbon buttons</text>
        <text x="70" y="250" fill="#aaa" font-size="14" font-family="Monaco, monospace">• VBA macros</text>
        <text x="70" y="280" fill="#aaa" font-size="14" font-family="Monaco, monospace">• Pivot tables</text>
        <text x="70" y="310" fill="#aaa" font-size="14" font-family="Monaco, monospace">• 147 other features...</text>

        <!-- Excel Body (Backend) -->
        <rect x="50" y="370" width="400" height="250" fill="#1a1a1a" stroke="#333" stroke-width="3" rx="10"/>
        <text x="250" y="410" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="Monaco, monospace">Excel Backend (BODY)</text>
        <text x="70" y="450" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Calculation engine</text>
        <text x="70" y="480" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Data storage</text>
        <text x="70" y="510" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Formula parser</text>
        <text x="70" y="540" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• File I/O</text>
        <text x="70" y="570" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Core APIs</text>

        <!-- Connection -->
        <line x1="250" y1="350" x2="250" y2="370" stroke="#f43f5e" stroke-width="4" stroke-dasharray="10,5"/>

        <!-- Label -->
        <text x="250" y="30" text-anchor="middle" fill="#f43f5e" font-size="20" font-weight="bold" font-family="Monaco, monospace">BEFORE: FatApp (Everyone gets same UI)</text>
    </g>

    <!-- Giant Scissors -->
    <g id="scissors">
        <path d="M 500 350 L 550 300 L 600 350 L 550 400 Z" fill="#f43f5e" opacity="0.8"/>
        <circle cx="530" cy="330" r="15" fill="#fff" stroke="#f43f5e" stroke-width="2"/>
        <circle cx="570" cy="370" r="15" fill="#fff" stroke="#f43f5e" stroke-width="2"/>
        <line x1="550" y1="350" x2="650" y2="350" stroke="#f43f5e" stroke-width="4"/>
        <text x="550" y="270" text-anchor="middle" fill="#f43f5e" font-size="28" font-weight="bold">✂️ CHOP!</text>
        <text x="550" y="300" text-anchor="middle" fill="#aaa" font-size="14" font-family="Monaco, monospace">Lop off the head</text>
    </g>

    <!-- After: Lean Versions -->
    <g id="lean-versions">
        <!-- Backend stays -->
        <rect x="750" y="370" width="400" height="250" fill="#1a1a1a" stroke="#22c55e" stroke-width="3" rx="10"/>
        <text x="950" y="410" text-anchor="middle" fill="#fff" font-size="24" font-weight="bold" font-family="Monaco, monospace">Same Backend APIs</text>
        <text x="770" y="450" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Calculation engine</text>
        <text x="770" y="480" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Data storage</text>
        <text x="770" y="510" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Formula parser</text>
        <text x="770" y="540" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• File I/O</text>
        <text x="770" y="570" fill="#00d9ff" font-size="14" font-family="Monaco, monospace">• Core APIs (exposed)</text>
        <text x="950" y="600" text-anchor="middle" fill="#22c55e" font-size="16" font-weight="bold" font-family="Monaco, monospace">✓ NO REWRITE NEEDED</text>

        <!-- Multiple lean UIs -->
        <rect x="700" y="50" width="150" height="120" fill="#0f766e" stroke="#14b8a6" stroke-width="2" rx="8"/>
        <text x="775" y="80" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Monaco, monospace">Jane's UI</text>
        <text x="775" y="100" text-anchor="middle" fill="#14b8a6" font-size="12" font-family="Monaco, monospace">2MB | 12 features</text>
        <text x="710" y="130" fill="#aaa" font-size="11" font-family="Monaco, monospace">SUM, AVG,</text>
        <text x="710" y="150" fill="#aaa" font-size="11" font-family="Monaco, monospace">VLOOKUP...</text>

        <rect x="870" y="50" width="150" height="120" fill="#7c2d12" stroke="#ea580c" stroke-width="2" rx="8"/>
        <text x="945" y="80" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Monaco, monospace">Bob's UI</text>
        <text x="945" y="100" text-anchor="middle" fill="#fb923c" font-size="12" font-family="Monaco, monospace">2.5MB | 18 features</text>
        <text x="880" y="130" fill="#aaa" font-size="11" font-family="Monaco, monospace">Charts,</text>
        <text x="880" y="150" fill="#aaa" font-size="11" font-family="Monaco, monospace">Pivot, IF...</text>

        <rect x="1040" y="50" width="150" height="120" fill="#581c87" stroke="#a855f7" stroke-width="2" rx="8"/>
        <text x="1115" y="80" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold" font-family="Monaco, monospace">AI-Gen UI</text>
        <text x="1115" y="100" text-anchor="middle" fill="#c084fc" font-size="12" font-family="Monaco, monospace">1.8MB | 8 features</text>
        <text x="1050" y="130" fill="#aaa" font-size="11" font-family="Monaco, monospace">Custom for</text>
        <text x="1050" y="150" fill="#aaa" font-size="11" font-family="Monaco, monospace">your workflow</text>

        <!-- Connections to backend -->
        <line x1="775" y1="170" x2="850" y2="370" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="945" y1="170" x2="950" y2="370" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>
        <line x1="1115" y1="170" x2="1050" y2="370" stroke="#22c55e" stroke-width="2" stroke-dasharray="5,5"/>

        <!-- Label -->
        <text x="950" y="30" text-anchor="middle" fill="#22c55e" font-size="20" font-weight="bold" font-family="Monaco, monospace">AFTER: Build YOUR version with AI</text>
    </g>

    <!-- Stats comparison -->
    <g id="stats">
        <rect x="50" y="680" width="1100" height="80" fill="rgba(0, 217, 255, 0.1)" stroke="#00d9ff" stroke-width="2" rx="8"/>
        <text x="600" y="710" text-anchor="middle" fill="#00d9ff" font-size="18" font-weight="bold" font-family="Monaco, monospace">Result: 97% smaller • 17x faster • 87% feature utilization</text>
        <text x="600" y="740" text-anchor="middle" fill="#aaa" font-size="14" font-family="Monaco, monospace">Backend unchanged. Zero backend migration. Pure frontend innovation.</text>
    </g>
</svg>
