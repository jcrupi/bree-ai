<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Genius Talent.ai</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-color: #0d0d0d; /* dark-950 */
        font-family: "Inter", system-ui, sans-serif;
        color: white;
        overflow: hidden;
      }

      .container {
        text-align: center;
        animation: fadeIn 1.5s ease-out;
      }

      .logo {
        font-size: 5rem;
        font-weight: 800;
        margin-bottom: 1rem;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, #fff 30%, #a3a3a3 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .highlight {
        color: #f97316; /* brand-orange */
        -webkit-text-fill-color: #f97316;
      }

      .subtitle {
        font-size: 1.5rem;
        color: #737373; /* dark-400 */
        font-weight: 400;
        margin-top: 0;
        opacity: 0;
        animation: slideUp 1s ease-out 0.5s forwards;
      }

      .features {
        display: flex;
        gap: 2rem;
        justify-content: center;
        margin-top: 3rem;
        opacity: 0;
        animation: slideUp 1s ease-out 1s forwards;
      }

      .feature-pill {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        padding: 0.75rem 1.5rem;
        border-radius: 9999px;
        font-size: 0.875rem;
        color: #d4d4d4;
        display: flex;
        align-items: center;
        gap: 0.5rem;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: scale(0.95);
        }
        to {
          opacity: 1;
          transform: scale(1);
        }
      }

      @keyframes slideUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .glow {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(
          circle,
          rgba(249, 115, 22, 0.15) 0%,
          rgba(0, 0, 0, 0) 70%
        );
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <div class="glow"></div>
    <div class="container">
      <div class="logo">Genius <span class="highlight">Talent.ai</span></div>
      <p class="subtitle">Agentic Recruiting Platform</p>

      <div class="features">
        <div class="feature-pill">🤖 AgentX Integration</div>
        <div class="feature-pill">🎯 Dynamic Assessment</div>
        <div class="feature-pill">⚡️ Real-time Analysis</div>
      </div>
    </div>
  </body>
</html>
