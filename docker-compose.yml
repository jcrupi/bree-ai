version: '3.8'

services:
  # Base API Service
  bree-api:
    image: bree-api:latest
    container_name: bree-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEMO_MODE=true
    env_file:
      - apps/api/.env
    restart: unless-stopped

  # AgentX Grapes (Frontend Applications)
  bree-kat-ai:
    image: bree-kat-ai:latest
    container_name: bree-kat-ai
    ports:
      - "8081:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-genius-talent:
    image: bree-genius-talent:latest
    container_name: bree-genius-talent
    ports:
      - "8082:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-habitaware-ai:
    image: bree-habitaware-ai:latest
    container_name: bree-habitaware-ai
    ports:
      - "8083:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-the-vineyard:
    image: bree-the-vineyard:latest
    container_name: bree-the-vineyard
    ports:
      - "8084:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-api-tracker:
    image: bree-api-tracker
    build:
      context: .
      dockerfile: apps/api-tracker/Dockerfile
    ports:
      - "8085:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - bree-api

volumes:
  bree_db_data:
