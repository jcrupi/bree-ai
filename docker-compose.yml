version: '3.8'

services:
  # Base API Service
  bree-api:
    image: bree-api:latest
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: bree-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DEMO_MODE=true
      - DATABASE_URL=postgres://postgres:postgres@postgres:5432/bree_ai
      - IDENTITY_ZERO_DB_URL=postgres://postgres:postgres@postgres:5432/bree_ai
    env_file:
      - apps/api/.env
    restart: unless-stopped
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    container_name: bree-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=bree_ai
    ports:
      - "5433:5432"
    volumes:
      - bree_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # AgentX Grapes (Frontend Applications)
  bree-kat-ai:
    image: bree-kat-ai:latest
    build:
      context: .
      dockerfile: apps/kat-ai/Dockerfile
    container_name: bree-kat-ai
    ports:
      - "8081:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-genius-talent:
    image: bree-genius-talent:latest
    build:
      context: .
      dockerfile: apps/genius-talent/Dockerfile
    container_name: bree-genius-talent
    ports:
      - "8082:3000"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-habitaware-ai:
    image: bree-habitaware-ai:latest
    build:
      context: .
      dockerfile: apps/habitaware-ai/Dockerfile
    container_name: bree-habitaware-ai
    ports:
      - "8083:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-the-vineyard:
    image: bree-the-vineyard:latest
    build:
      context: .
      dockerfile: apps/the-vineyard/Dockerfile
    container_name: bree-the-vineyard
    ports:
      - "8084:8080"
    depends_on:
      - bree-api
    restart: unless-stopped

  bree-api-tracker:
    image: bree-api-tracker
    build:
      context: .
      dockerfile: apps/ai-tracker/Dockerfile
    ports:
      - "8085:80"
    environment:
      - VITE_API_URL=http://localhost:3000
    depends_on:
      - bree-api

volumes:
  bree_db_data:
